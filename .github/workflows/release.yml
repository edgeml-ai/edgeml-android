name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3 or v1.2.3)'
        required: true
        type: string
      include_external_runtimes:
        description: 'Build a runtime-bundled AAR. Requires optional runtime artifacts to be published.'
        required: false
        default: false
        type: boolean

permissions: {}

jobs:
  build:
    timeout-minutes: 20
    name: Build Release AAR
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: write

    steps:
      - name: Generate version bot token
        id: app-token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v3.0.0
        with:
          app-id: ${{ secrets.VERSION_BOT_APP_ID }}
          private-key: ${{ secrets.VERSION_BOT_PRIVATE_KEY }}
          owner: octomil
          repositories: octomil-android

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          RAW="$INPUT_VERSION"
          PLAIN="${RAW#v}"
          if ! printf '%s' "$PLAIN" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Expected stable SemVer, got '$RAW'"
            exit 1
          fi
          TAG="v${PLAIN}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "plain=${PLAIN}" >> "$GITHUB_OUTPUT"
          echo "Building release ${TAG}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Bump gradle.properties
        env:
          PLAIN: ${{ steps.version.outputs.plain }}
          TAG: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "octomil-release-bot"
          git config user.email "release-bot@octomil.local"
          CURRENT=$(grep -E '^OCTOMIL_VERSION=' gradle.properties | cut -d= -f2 | tr -d ' ')
          if [ "$CURRENT" = "$PLAIN" ]; then
            echo "gradle.properties already at ${PLAIN}; no commit needed."
            exit 0
          fi
          # Use python with argv to avoid sed pattern interpolation.
          python3 - "$PLAIN" <<'PY'
          import pathlib, re, sys
          plain = sys.argv[1]
          if not re.fullmatch(r"\d+\.\d+\.\d+", plain):
              raise SystemExit(f"refusing to write non-SemVer version: {plain!r}")
          path = pathlib.Path("gradle.properties")
          text = path.read_text(encoding="utf-8")
          new, n = re.subn(
              r"^OCTOMIL_VERSION=.*$",
              f"OCTOMIL_VERSION={plain}",
              text, count=1, flags=re.MULTILINE,
          )
          if n != 1:
              raise SystemExit("expected exactly one OCTOMIL_VERSION line")
          path.write_text(new, encoding="utf-8")
          PY
          git add gradle.properties
          git commit -m "chore: release ${TAG}"
          git push origin main

      - name: Create tag
        env:
          TAG: ${{ steps.version.outputs.version }}
        run: |
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists locally."
          elif git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin."
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build release AAR
        env:
          INCLUDE_EXTERNAL_RUNTIMES: ${{ github.event_name == 'workflow_dispatch' && inputs.include_external_runtimes || 'false' }}
        run: |
          # Release builds run in fresh checkouts; disabling config cache avoids stale optional-runtime dependency graphs.
          GRADLE_ARGS=(":octomil:assembleRelease" "--no-configuration-cache")
          if [ "${INCLUDE_EXTERNAL_RUNTIMES}" = "true" ]; then
            echo "Building runtime-bundled AAR with optional external runtime artifacts."
            GRADLE_ARGS+=("-Poctomil.includeExternalRuntimes=true")
          else
            echo "Building core SDK AAR without optional external runtime artifacts."
          fi
          ./gradlew "${GRADLE_ARGS[@]}"

      - name: Verify AAR exists
        run: |
          AAR_PATH="octomil/build/outputs/aar/octomil-release.aar"
          if [ ! -f "${AAR_PATH}" ]; then
            echo "ERROR: AAR not found at ${AAR_PATH}"
            exit 1
          fi
          echo "AAR size: $(du -h "${AAR_PATH}" | cut -f1)"

      - name: Generate subject hash
        id: hash
        run: |
          echo "hashes=$(sha256sum octomil/build/outputs/aar/octomil-release.aar | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact for provenance
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-aar
          path: octomil/build/outputs/aar/octomil-release.aar
          if-no-files-found: error
          retention-days: 1

  provenance:
    name: Generate SLSA Provenance
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true

  release:
    timeout-minutes: 15
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, provenance]
    permissions:
      contents: write

    steps:
      - name: Generate version bot token
        id: app-token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v3.0.0
        with:
          app-id: ${{ secrets.VERSION_BOT_APP_ID }}
          private-key: ${{ secrets.VERSION_BOT_PRIVATE_KEY }}
          owner: octomil
          repositories: octomil-android

      - name: Download artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: release-aar

      - name: Download provenance
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.build.outputs.version }}
          PROVENANCE: ${{ needs.provenance.outputs.provenance-name }}
        run: |
          if gh release view "${VERSION}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists; skipping creation."
            exit 0
          fi
          gh release create "${VERSION}" \
            octomil-release.aar \
            "${PROVENANCE}" \
            --title "Octomil Android SDK ${VERSION}" \
            --generate-notes \
            --repo "${GITHUB_REPOSITORY}"
