name: Notify Server

on:
  push:
    tags:
      - 'v*'

jobs:
  notify:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.VERSION_BOT_APP_ID }}
          private-key: ${{ secrets.VERSION_BOT_PRIVATE_KEY }}
          owner: octomil
          repositories: octomil-server

      - name: Get version
        id: version
        run: |
          version=$(grep OCTOMIL_VERSION gradle.properties | cut -d= -f2)
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Dispatch to server
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: octomil/octomil-server
          event-type: sdk-release
          client-payload: '{"sdk": "android", "version": "${{ steps.version.outputs.version }}"}'
