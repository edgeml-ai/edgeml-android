name: Auto Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

concurrency:
  group: auto-release-main
  cancel-in-progress: false

permissions: {}

jobs:
  bump-and-release:
    name: Dispatch next release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    permissions:
      actions: write
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Verify triggering SHA is still main HEAD
        id: pin
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          git fetch origin main
          ACTUAL=$(git rev-parse origin/main)
          if [ "$ACTUAL" != "$SHA" ]; then
            echo "::notice::main has advanced (${ACTUAL}) past triggering SHA (${SHA}); skipping release. Next push will retry."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify all check runs green at triggering SHA
        id: gate
        if: steps.pin.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          runs=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/commits/${SHA}/check-runs" --jq '.check_runs[]' | jq -s '.')
          filtered=$(echo "$runs" | jq '[.[] | select(.name != "Dispatch next release")]')
          pending=$(echo "$filtered" | jq -r '.[] | select(.status != "completed") | .name')
          failed=$(echo "$filtered"  | jq -r '.[] | select(.status == "completed") | select(.conclusion | IN("success","neutral","skipped") | not) | .name')
          if [ -n "$pending" ]; then
            echo "::notice::checks still in progress at ${SHA}; skipping release. Next push will retry."
            printf 'pending:\n%s\n' "$pending"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$failed" ]; then
            echo "::warning::checks failed at ${SHA}; skipping release."
            printf 'failed:\n%s\n' "$failed"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          total=$(echo "$filtered" | jq 'length')
          echo "All ${total} required checks green at ${SHA}."
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Compute next release version
        id: version
        if: steps.pin.outputs.skip != 'true' && steps.gate.outputs.skip != 'true'
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib, re, subprocess

          stable_tag = re.compile(r"^v\d+\.\d+\.\d+$")
          tags_at_head = {
              line.strip()
              for line in subprocess.check_output(
                  ["git", "tag", "--points-at", "HEAD", "--list", "v*"], text=True
              ).splitlines()
              if stable_tag.fullmatch(line.strip())
          }
          if tags_at_head:
              tag = sorted(tags_at_head)[-1]
              print("already_released=true")
              print(f"tag={tag}")
              print(f"version={tag.removeprefix('v')}")
              raise SystemExit(0)

          props = pathlib.Path("gradle.properties").read_text(encoding="utf-8")
          m = re.search(r"^OCTOMIL_VERSION=(\d+)\.(\d+)\.(\d+)\s*$", props, re.MULTILINE)
          if m is None:
              raise SystemExit("auto-release only supports stable SemVer OCTOMIL_VERSION")
          major, minor, patch = map(int, m.groups())
          existing = {
              line.strip()
              for line in subprocess.check_output(["git", "tag", "--list", "v*"], text=True).splitlines()
          }
          while True:
              patch += 1
              version = f"{major}.{minor}.{patch}"
              tag = f"v{version}"
              if tag not in existing:
                  break
          print("already_released=false")
          print(f"version={version}")
          print(f"tag={tag}")
          PY

      - name: Dispatch release workflow
        if: >
          steps.pin.outputs.skip != 'true' &&
          steps.gate.outputs.skip != 'true' &&
          steps.version.outputs.already_released != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; nothing to dispatch."
            exit 0
          fi

          gh workflow run release.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref main \
            -f version="${VERSION}"
