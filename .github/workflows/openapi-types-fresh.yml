name: openapi-types-fresh

# Verify that the committed generated/transport/ files are in sync with the
# OpenAPI spec in octomil-contracts. Fails if any diff is detected.
#
# Mirrors the Node pilot pattern from octomil-node#94 / #95.

on:
  # Run on every PR — upstream-only drift (contracts SHA bump, auto-PR
  # refreshes) has no local footprint under generated/transport/.
  # Composes with #277 so this branch is independently correct.
  pull_request:
  push:
    branches:
      - main

jobs:
  openapi-freshness:
    name: Verify generated transport types are fresh
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout octomil-android
        uses: actions/checkout@v4
        with:
          path: octomil-android

      - name: Checkout octomil-contracts
        uses: actions/checkout@v4
        with:
          repository: octomil/octomil-contracts
          path: octomil-android/.contracts-checkout
          # Cross-repo checkout of a private repo — github.token cannot
          # read it. CROSS_REPO_READ_TOKEN must be a PAT with
          # `contents: read` on octomil/octomil-contracts.
          token: ${{ secrets.CROSS_REPO_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download openapi-generator-cli 7.10.0
        run: |
          mkdir -p /tmp/openapi-gen
          curl -sSL \
            "https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/7.10.0/openapi-generator-cli-7.10.0.jar" \
            -o /tmp/openapi-gen/openapi-generator-cli.jar
          # Create a wrapper script on PATH
          cat > /usr/local/bin/openapi-generator << 'EOF'
          #!/usr/bin/env bash
          exec java -jar /tmp/openapi-gen/openapi-generator-cli.jar "$@"
          EOF
          chmod +x /usr/local/bin/openapi-generator
          openapi-generator version

      - name: Set up Android SDK (for compileKotlin postflight)
        uses: android-actions/setup-android@v4

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Build contracts spec
        working-directory: octomil-android/.contracts-checkout
        run: |
          pip install pyyaml jsonschema --quiet
          make --silent spec-build

      - name: Regenerate transport types
        working-directory: octomil-android
        env:
          OCTOMIL_ANDROID_PATH: ${{ github.workspace }}/octomil-android
          OCTOMIL_ANDROID: "1"
          OCTOMIL_SKIP_INSTALL: "1"
        run: |
          bash .contracts-checkout/tools/sdkgen/generate-kotlin.sh

      - name: Verify no diff in generated/transport/
        working-directory: octomil-android
        run: |
          git diff --exit-code octomil/src/main/kotlin/ai/octomil/generated/transport/ || {
            echo ""
            echo "ERROR: generated/transport/ is out of sync with the OpenAPI spec."
            echo "Run: make openapi-generate  then commit the result."
            exit 1
          }

      - name: Run banner check
        working-directory: octomil-android
        run: bash scripts/check_openapi_banner.sh

      - name: Run compileKotlin postflight
        working-directory: octomil-android
        run: ./gradlew :octomil:compileDebugKotlin --quiet

      - name: Fetch latest server openapi snapshot
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_READ_TOKEN || github.token }}
        run: |
          SHA=$(gh run list --repo octomil/octomil-server --workflow ci.yml \
                --branch main --status success --limit 1 --json headSha -q '.[0].headSha')
          mkdir -p "$GITHUB_WORKSPACE/.snapshot"
          if gh run download --repo octomil/octomil-server --name "openapi-snapshot-${SHA}" --dir "$GITHUB_WORKSPACE/.snapshot" 2>/dev/null; then
            echo "Fetched snapshot for SHA $SHA"
            ls -la "$GITHUB_WORKSPACE/.snapshot/"
          else
            echo "::warning::No openapi-snapshot artifact for $SHA — skipping strict check"
            echo "SKIP_STRICT=1" >> $GITHUB_ENV
          fi

      - name: Strict spec->server gate (this SDK's contracts SHA has a real server route)
        if: env.SKIP_STRICT != '1'
        run: |
          # Verify every contract method this SDK was generated against
          # has a real server route. Without this, the SDK could ship
          # clients for spec-only endpoints that 404 at runtime.
          cd "$GITHUB_WORKSPACE/octomil-android/.contracts-checkout"
          python3 scripts/spec_coverage.py --strict --openapi-file "$GITHUB_WORKSPACE/.snapshot/openapi-snapshot.json" || {
            echo "::error::SDK was generated against a contracts SHA with documented-but-not-in-server methods."
            echo "Wait for octomil-server to ship matching endpoints, OR mark stray methods transport: local in contracts."
            exit 1
          }
