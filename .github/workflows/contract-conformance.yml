name: Contract Conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  conformance:
    name: android conformance
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Fetch contracts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: octomil/octomil-contracts
          ref: main
          path: .contract
          token: ${{ secrets.CROSS_REPO_READ_TOKEN || github.token }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install codegen dependencies
        run: python -m pip install PyYAML==6.0.2

      - name: Read contract version
        id: contract
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import yaml

          version = yaml.safe_load(pathlib.Path(".contract/contract.yaml").read_text())["version"]
          print(f"version={version}")
          PY

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Check generated contracts
        run: python3 .contract/scripts/sync_generated.py --sdk android --check --target-dir octomil/src/main/kotlin/ai/octomil/generated

      - name: Run conformance tests
        env:
          CONTRACT_ROOT: ${{ github.workspace }}/.contract
          CONTRACT_VERSION: ${{ steps.contract.outputs.version }}
        # -PoctomilRuntime.skipFetch=true: octomil-runtime is a private repo
        # and conformance CI does not carry a PAT for it. Drop this once the
        # release is public or CI is granted a scoped secret.
        run: |
          ./gradlew :octomil:testDebugUnitTest --tests 'ai.octomil.conformance.*' -PoctomilRuntime.skipFetch=true
          python3 .contract/ci/audit-sdks.py --sdk android --sdk-path . --out parity_report.json

      - name: Gate parity score
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import sys

          report_path = pathlib.Path("parity_report.json")
          if not report_path.exists():
              print("::error::No parity report generated.")
              sys.exit(1)
          score = json.loads(report_path.read_text()).get("summary", {}).get("parityScore", 0)
          print(f"Parity score: {score}% (floor: 60%)")
          if float(score) < 60:
              print(f"::error::Parity score {score}% is below floor 60%")
              sys.exit(1)
          PY

      - name: Upload parity report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: parity-android-${{ steps.contract.outputs.version }}
          path: parity_report.json
          retention-days: 90

  conformance-complete:
    name: Contract Conformance Complete
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - conformance
    if: always()
    permissions:
      contents: read
    steps:
      - name: Verify conformance succeeded
        run: |
          set -euo pipefail
          results='${{ toJSON(needs.*.result) }}'
          echo "Needed job results: ${results}"
          if echo "${results}" | grep -Eq '"(failure|cancelled|skipped)"'; then
            echo "::error::Contract conformance failed, was cancelled, or was skipped."
            exit 1
          fi
          echo "Contract conformance complete."
