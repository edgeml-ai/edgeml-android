name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Daily 6am UTC cron removed: it ran ./gradlew :octomil:testDebugUnitTest
  # which has been hanging to the 6h job ceiling on every fire. Re-add
  # the schedule trigger once the underlying gradle hang is rooted out.

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

# Build-for-test layout (see contributor notes below before editing):
#
#   1. The `test` job runs unit tests + Android lint + jacoco in a SINGLE
#      Gradle invocation. Don't split lint back into its own job — they
#      share the same debug-variant compile, and running them separately
#      cold-compiles `:octomil` twice per PR for no reason.
#   2. `gradle/actions/setup-gradle@v4` owns Gradle caching here.
#      Do NOT also set `cache: gradle` on `actions/setup-java` — the two
#      caches collide and you end up with neither working well.
#   3. PR builds run `cache-read-only: true` so a flaky PR can't poison
#      the cache that main relies on. Only pushes to main write to it.
#   4. `--no-configuration-cache` is intentionally scoped to the `sonar`
#      task only (the Sonar plugin is the lone holdout that can't handle
#      the configuration cache). Don't sprinkle it onto other tasks.

jobs:
  test:
    name: Test + Lint Android
    runs-on: ubuntu-latest
    # Cap the gradle test run. Unit tests run with short-lived single-lane
    # forks to avoid MockK/Robolectric heap accumulation, which is safer
    # but a little slower than large shared test workers.
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          # No `cache: gradle` here — setup-gradle below owns Gradle caching.

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
        with:
          # Only main writes to the shared build cache; PRs read it.
          # Prevents a flaky PR build from poisoning main's cache entries.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run tests + lint + coverage
        # ONE Gradle invocation = one configuration phase, one debug-variant
        # compile shared across testDebugUnitTest + lintDebug + jacocoTestReport.
        # If you split this back into multiple `run:` steps or jobs, you will
        # re-pay the AGP/Kotlin compile cost for each one. Don't.
        run: >
          ./gradlew
          :octomil:testDebugUnitTest
          :octomil:lintDebug
          :octomil:jacocoTestReport
          --build-cache

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: ./octomil/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          flags: android
          name: android
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact for SonarCloud
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            octomil/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
            octomil/build/test-results/testDebugUnitTest/

      - name: Upload lint reports
        # `if: always()` so lint output is still surfaced when tests fail —
        # otherwise a flaky test masks lint regressions on the same PR.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-reports
          path: octomil/build/reports/lint-results-debug.html

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
        with:
          # Read-only: this job only consumes the cache populated by `test`.
          cache-read-only: true

      - name: Download coverage artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4
        with:
          name: coverage-report
          path: octomil/build

      - name: Run SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # `--no-configuration-cache` lives here and ONLY here — the Sonar
        # plugin is the only task in this repo that breaks Gradle's
        # configuration cache. Don't propagate the flag elsewhere.
        run: ./gradlew sonar --no-configuration-cache --build-cache
