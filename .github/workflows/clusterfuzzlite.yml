name: ClusterFuzzLite

# WHY THIS DOESN'T RUN ON PULL REQUESTS:
# The current fuzz target (.clusterfuzzlite/build.sh) only exercises JDK
# stdlib — URI.create, UUID.fromString, Base64.decode — and does NOT touch
# any Octomil code paths. Running it on every PR was burning ~5 min of
# Actions budget per push for zero signal about Octomil itself.
#
# We keep the weekly cron + manual dispatch so the corpus continues to
# grow and infrastructure doesn't bitrot. Re-enable the `pull_request:`
# trigger once the harness actually exercises something we own — good
# candidates: contract-type JSON deserialization, PlannerSourceNormalizer,
# RoutingPolicyNames parsing, the API base-URL config parser.

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: clusterfuzzlite-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  fuzz:
    timeout-minutes: 25
    name: Fuzz Testing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Build fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: jvm
          sanitizer: ${{ matrix.sanitizer }}
          keep-unaffected-fuzz-targets: true

      - name: Run fuzzers
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 300
          # `mode: batch` (not `code-change`) — without PR triggers,
          # `code-change` mode has no diff to scope to. Batch fuzzes the
          # full corpus, which is what you want for the weekly schedule.
          mode: batch
          sanitizer: ${{ matrix.sanitizer }}
