name: Publish to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  publish:
    name: Publish Android SDK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate publishing secrets
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          test -n "${OSSRH_USERNAME}" || { echo "Missing OSSRH_USERNAME"; exit 1; }
          test -n "${OSSRH_PASSWORD}" || { echo "Missing OSSRH_PASSWORD"; exit 1; }
          test -n "${MAVEN_GPG_PRIVATE_KEY}" || { echo "Missing MAVEN_GPG_PRIVATE_KEY"; exit 1; }
          test -n "${MAVEN_GPG_PASSPHRASE}" || { echo "Missing MAVEN_GPG_PASSPHRASE"; exit 1; }

      - name: Publish to Maven Central
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          ./gradlew :octomil:publishReleasePublicationToSonatypeOSSRHRepository --no-configuration-cache

          AUTH="$(python3 - <<'PY'
          import base64
          import os

          token = f"{os.environ['OSSRH_USERNAME']}:{os.environ['OSSRH_PASSWORD']}"
          print(base64.b64encode(token.encode()).decode())
          PY
          )"

          curl -fsS -X POST \
            -H "Authorization: Bearer ${AUTH}" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/com.octomil?publishing_type=automatic"
