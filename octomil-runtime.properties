# octomil-runtime fetch configuration
#
# These properties control which runtime artifact is downloaded and staged
# into jniLibs/arm64-v8a/ at build time by the fetchRuntime Gradle task.
#
# Version pin
#   Must be v0.1.5 or later — v0.1.4 did NOT ship android-arm64 artifacts.
#   Update this when a new runtime release ships.
octomilRuntime.version=v0.1.10

# Flavor
#   "chat"  — llama.cpp inference: chat.completion, chat.stream, embeddings.text
#   "stt"   — whisper.cpp + sherpa-onnx: audio.stt.batch, audio.stt.stream (Phase 5b)
#   The AAR currently bundles ONE flavor at build time.
#   Multi-flavor AAR support is a future option.
octomilRuntime.flavor=chat

# ABI
#   Phase 5a ships arm64-v8a only. Do not change without a corresponding
#   runtime release that includes the requested ABI.
octomilRuntime.abi=arm64-v8a

# Skip fetch (offline / pre-cached builds)
#   Set to true to skip the GitHub download entirely. The .so files must
#   already be present in jniLibs/<abi>/ for the build to succeed.
#   Override per-build: ./gradlew :octomil:assembleDebug -PoctomilRuntime.skipFetch=true
octomilRuntime.skipFetch=false
