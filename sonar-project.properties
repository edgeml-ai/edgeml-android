sonar.projectKey=octomil_octomil-android
sonar.organization=octomil

# Project information
sonar.projectName=Octomil Android SDK
sonar.projectVersion=1.1.0

# Source code location
sonar.sources=octomil/src/main/kotlin
sonar.tests=octomil/src/test/kotlin

# Android/Kotlin specific settings
sonar.java.binaries=octomil/build/tmp/kotlin-classes/debug,octomil/build/intermediates/javac/debug/classes
sonar.coverage.jacoco.xmlReportPaths=octomil/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

# Exclusions
sonar.exclusions=**/R.java,**/*.xml,**/BuildConfig.java,**/Manifest*.*,**/*Test*.*

# Coverage exclusions
sonar.coverage.exclusions=**/*Test*.*,**/test/**,**/api/OctomilApi.kt

# Encoding
sonar.sourceEncoding=UTF-8
