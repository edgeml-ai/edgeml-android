[package]
versioned_files = ["gradle.properties"]
changelog = "CHANGELOG.md"

# gradle.properties contains: OCTOMIL_VERSION=X.Y.Z
# knope matches semantic version patterns in versioned_files

[workflows.release]
[[workflows.release.steps]]
type = "PrepareRelease"

[[workflows.release.steps]]
type = "CreatePullRequest"
base = "main"

[workflows.release-pr-merged]
[[workflows.release-pr-merged.steps]]
type = "Release"
